name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check belfed-auth.js
        run: node --check belfed-auth.js
      - name: Syntax check belfed-confirm.js
        run: node --check belfed-confirm.js
      - name: Run signup flow tests
        run: node tests/signup.test.js
      - name: Run email confirmation tests
        run: node tests/confirm.test.js
      - name: Run telegram connect tests
        run: node tests/telegram-link.test.js
      - name: Syntax check build_review_manifest.js
        run: node --check build_review_manifest.js
      - name: Run trade-review card tests
        run: node tests/review-cards.test.js
      - name: Run results-page CSV parser tests
        run: node tests/csv-parse.test.js
      - name: Syntax check build_trades_fallback.js
        run: node --check build_trades_fallback.js
      - name: Run offline fallback dot-parity tests
        run: node tests/fallback-dots.test.js
