name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check belfed-auth.js
        run: node --check belfed-auth.js
      - name: Run signup flow tests
        run: node tests/signup.test.js
