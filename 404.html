<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — BelFed Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#f5f5f0;color:#0a0a0a;font-family:'Courier Prime','Courier New',monospace;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;padding:40px;text-align:center}
    .code{font-size:96px;font-weight:700;letter-spacing:-0.02em;line-height:1;margin-bottom:24px}
    h1{font-size:18px;letter-spacing:0.1em;margin-bottom:12px}
    p{font-size:14px;color:#555;line-height:1.7;margin-bottom:28px;max-width:420px}
    a{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;color:#fff;background:#0a0a0a;padding:14px 28px;border:1px solid #0a0a0a}
    a:hover{background:transparent;color:#0a0a0a}
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>PAGE NOT FOUND</h1>
  <p>The page you're looking for doesn't exist or has been moved. Head back to the homepage.</p>
  <a href="/">Back to home</a>
</body>
</html>
