<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — BelFed Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#f5f5f0;color:#0a0a0a;font-family:'Courier Prime','Courier New',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;font-size:15px}
    .box{background:#fff;border:1px solid #d0d0ca;padding:48px;max-width:420px;width:100%}
    h1{font-size:18px;letter-spacing:0.1em;margin-bottom:8px;text-align:center}
    .sub{font-size:11px;color:#888;letter-spacing:0.08em;margin-bottom:28px;text-align:center}
    input{font-family:inherit;width:100%;padding:12px 16px;font-size:13px;border:1px solid #d0d0ca;background:#fff;margin-bottom:12px;outline:none}
    input:focus{border-color:#0a0a0a}
    button{font-family:inherit;width:100%;padding:14px;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;background:#0a0a0a;color:#fff;border:1px solid #0a0a0a;cursor:pointer;margin-top:6px}
    button:hover{background:transparent;color:#0a0a0a}
    .msg{font-size:12px;margin-top:12px;text-align:center;display:none}
    .msg.error{color:#8b1a1a;display:block}
    .msg.success{color:#1a6b3a;display:block}
  </style>
</head>
<body>
  <div class="box">
    <h1>RESET PASSWORD</h1>
    <div class="sub">ENTER YOUR NEW PASSWORD</div>
    <input type="password" id="pw" placeholder="New password (min 6 characters)">
    <input type="password" id="pw2" placeholder="Repeat password">
    <button onclick="submitReset()">Update password</button>
    <div id="msg" class="msg"></div>
  </div>
  <script>
    var SUPABASE_URL='https://obujqvqqmyfcfflhqvud.supabase.co';
    var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9idWpxdnFxbXlmY2ZmbGhxdnVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDgxNjYsImV4cCI6MjA4OTkyNDE2Nn0.syl4YBLbf8aBitxyK3gCL51pPYxWjEW99mMTXJaQQ8w';
    var sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    var hash=window.location.hash;
    if(hash&&hash.includes('access_token')){
      var p=new URLSearchParams(hash.substring(1));
      var at=p.get('access_token'),rt=p.get('refresh_token');
      if(at&&rt){sb.auth.setSession({access_token:at,refresh_token:rt});}
    }
    async function submitReset(){
      var pw=document.getElementById('pw').value;
      var pw2=document.getElementById('pw2').value;
      var msg=document.getElementById('msg');
      msg.className='msg';
      if(!pw||pw.length<6){msg.className='msg error';msg.textContent='Password must be at least 6 characters';return;}
      if(pw!==pw2){msg.className='msg error';msg.textContent='Passwords do not match';return;}
      try{
        var r=await sb.auth.updateUser({password:pw});
        if(r.error)throw r.error;
        msg.className='msg success';
        msg.textContent='Password updated. Redirecting…';
        setTimeout(function(){window.location.href='/members.html';},1500);
      }catch(e){
        msg.className='msg error';
        msg.textContent=e.message||'Failed to update password';
      }
    }
  </script>
</body>
</html>
